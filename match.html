<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Manager - Match Stats Pro</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --home-color: #10b981; /* Hijau Emerald */
            --away-color: #3b82f6; /* Biru Royal */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- HEADER & SCOREBOARD --- */
        header {
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 50;
        }
        .score-row { 
            display: flex; justify-content: space-between; align-items: center; 
            max-width: 320px; margin: 0 auto; 
        }
        .team { font-weight: bold; font-size: 0.9rem; width: 30%; }
        .score { font-size: 2rem; font-weight: 800; letter-spacing: 1px; }
        .timer { font-family: monospace; color: #4ade80; font-size: 0.9rem; margin-top: 5px; }

        .toggle-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }
        .toggle-btn:hover { background: rgba(255,255,255,0.25); }

        /* --- STATISTIK PANEL (Rapi Seperti Foto) --- */
        #statsPanel {
            background: white;
            padding: 20px 15px;
            border-bottom: 1px solid var(--border);
            display: none; /* Hidden by default */
            animation: slideDown 0.3s ease;
            max-height: 50vh;
            overflow-y: auto;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .stat-title { 
            text-align: center; font-weight: bold; font-size: 0.9rem; 
            margin-bottom: 15px; color: #334155; 
        }

        /* Layout Baris Statistik */
        .stat-row {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            font-size: 0.8rem;
        }

        .val-left { 
            width: 45px; text-align: right; font-weight: bold; color: #334155; 
            font-variant-numeric: tabular-nums;
        }
        
        .label-center { 
            flex: 1; text-align: center; color: #64748b; font-size: 0.75rem; 
            padding: 0 10px;
        }
        
        .val-right { 
            width: 45px; text-align: left; font-weight: bold; color: #334155; 
            font-variant-numeric: tabular-nums;
        }

        /* Container Bar Warna */
        .bar-track {
            position: absolute;
            top: 50%; left: 55px; right: 55px; /* Sesuaikan dengan lebar val-left/right */
            height: 6px;
            background: #f1f5f9;
            border-radius: 3px;
            transform: translateY(-50%);
            display: flex;
            overflow: hidden;
            z-index: 1;
        }

        .bar-fill-home { 
            background: var(--home-color); height: 100%; 
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .bar-fill-away { 
            background: var(--away-color); height: 100%; 
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        /* Wrapper relatif untuk menumpuk teks di atas bar */
        .stat-content {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* --- COMMENTARY LOG --- */
        .log-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: var(--bg);
            display: flex;
            flex-direction: column-reverse;
        }

        .log-item {
            background: white;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 4px solid #cbd5e1;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-size: 0.85rem;
            line-height: 1.4;
            animation: fadeIn 0.4s ease;
        }
        
        .log-goal { border-left-color: #f59e0b; background: #fffbeb; }
        .log-chance { border-left-color: #8b5cf6; background: #f5f3ff; }
        .log-card { border-left-color: #ef4444; background: #fef2f2; }
        .log-corner { border-left-color: #3b82f6; background: #eff6ff; }

        .log-time { font-weight: bold; color: #64748b; margin-right: 8px; font-size: 0.75rem; }

        /* --- FOOTER --- */
        footer {
            background: white;
            padding: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .btn-pause { background: #f1f5f9; color: var(--text); }
        .btn-resume { background: var(--primary, #2563eb); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="score-row">
            <div class="team">FC Ultra</div>
            <div class="score" id="scoreDisplay">0 - 0</div>
            <div class="team">Real Madrid</div>
        </div>
        <div class="timer" id="timerDisplay">00'</div>
        <button class="toggle-btn" onclick="toggleStats()">📊 Lihat Statistik Lengkap</button>
    </header>

    <!-- Panel Statistik (Desain Rapi) -->
    <div id="statsPanel">
        <div class="stat-title">Ringkasan Pertandingan</div>

        <!-- Penguasaan Bola -->
        <div class="stat-row">
            <div class="stat-content">
                <div class="val-left" id="s_poss_h">50%</div>
                <div class="label-center">Penguasaan bola</div>
                <div class="val-right" id="s_poss_a">50%</div>
                <div class="bar-track">
                    <div class="bar-fill-home" id="bar_poss_h" style="width: 50%"></div>
                    <div class="bar-fill-away" id="bar_poss_a" style="width: 50%"></div>
                </div>
            </div>
        </div>

        <!-- Ekspektasi Gol (xG) -->
        <div class="stat-row">
            <div class="stat-content">
                <div class="val-left" id="s_xg_h">0.00</div>
                <div class="label-center">Ekspektasi gol (xG)</div>
                <div class="val-right" id="s_xg_a">0.00</div>
                <div class="bar-track">
                    <div class="bar-fill-home" id="bar_xg_h" style="width: 50%"></div>
                    <div class="bar-fill-away" id="bar_xg_a" style="width: 50%"></div>
                </div>
            </div>
        </div>

        <!-- Peluang Emas -->
        <div class="stat-row">
            <div class="stat-content">
                <div class="val-left" id="s_big_h">0</div>
                <div class="label-center">Peluang emas</div>
                <div class="val-right" id="s_big_a">0</div>
                <div class="bar-track">
                    <div class="bar-fill-home" id="bar_big_h" style="width: 50%"></div>
                    <div class="bar-fill-away" id="bar_big_a" style="width: 50%"></div>
                </div>
            </div>
        </div>

        <!-- Total Tembakan -->
        <div class="stat-row">
            <div class="stat-content">
                <div class="val-left" id="s_shot_h">0</div>
                <div class="label-center">Total tembakan</div>
                <div class="val-right" id="s_shot_a">0</div>
                <div class="bar-track">
                    <div class="bar-fill-home" id="bar_shot_h" style="width: 50%"></div>
                    <div class="bar-fill-away" id="bar_shot_a" style="width: 50%"></div>
                </div>
            </div>
        </div>

        <!-- Penyelamatan Kiper -->
        <div class="stat-row">
            <div class="stat-content">
                <div class="val-left" id="s_save_h">0</div>
                <div class="label-center">Penyelamatan kiper</div>
                <div class="val-right" id="s_save_a">0</div>
                <div class="bar-track">
                    <div class="bar-fill-home" id="bar_save_h" style="width: 50%"></div>
                    <div class="bar-fill-away" id="bar_save_a" style="width: 50%"></div>
                </div>
            </div>
        </div>

        <!-- Tendangan Sudut -->
        <div class="stat-row">
            <div class="stat-content">
                <div class="val-left" id="s_cor_h">0</div>
                <div class="label-center">Tendangan sudut</div>
                <div class="val-right" id="s_cor_a">0</div>
                <div class="bar-track">
                    <div class="bar-fill-home" id="bar_cor_h" style="width: 50%"></div>
                    <div class="bar-fill-away" id="bar_cor_a" style="width: 50%"></div>
                </div>
            </div>
        </div>

        <!-- Pelanggaran -->
        <div class="stat-row">
            <div class="stat-content">
                <div class="val-left" id="s_foul_h">0</div>
                <div class="label-center">Pelanggaran</div>
                <div class="val-right" id="s_foul_a">0</div>
                <div class="bar-track">
                    <div class="bar-fill-home" id="bar_foul_h" style="width: 50%"></div>
                    <div class="bar-fill-away" id="bar_foul_a" style="width: 50%"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Area Komentar -->
    <div class="log-container" id="logBox">
        <div class="log-item">
            <span class="log-time">00'</span>  Pertandingan dimulai! Wasit meniup peluit awal.
        </div>
    </div>

    <!-- Footer Controls -->
    <footer>
        <button class="btn btn-pause" onclick="togglePause()" id="btnPause">⏸️ Pause</button>
        <button class="btn btn-resume" onclick="togglePause()" id="btnResume" style="display:none;">▶️ Lanjut</button>
    </footer>

    <script>
        // --- STATE GAME ---
        let minute = 0;
        let scoreH = 0, scoreA = 0;
        let isPaused = false;
        let momentum = 50; // 0-100 (Home advantage)
        
        // Stats Data
        let stats = {
            possH: 50, possA: 50,
            xGH: 0.0, xGA: 0.0,
            shotH: 0, shotA: 0,
            bigH: 0, bigA: 0,
            corH: 0, corA: 0,
            saveH: 0, saveA: 0,
            foulH: 0, foulA: 0
        };

        // --- ENGINE UTAMA ---
        function startMatch() {
            setInterval(() => {
                if (!isPaused && minute < 90) {
                    minute++;
                    document.getElementById('timerDisplay').innerText = minute + "'";
                    processMinute();
                } else if (minute === 90) {
                    addLog(90, "neutral", "  Pertandingan Selesai!");
                    isPaused = true;
                    updateButtons();
                }
            }, 1200); // Kecepatan simulasi
        }

        function processMinute() {
            // 1. Update Momentum
            momentum += (Math.random() * 10 - 5);
            if (momentum > 95) momentum = 95;
            if (momentum < 5) momentum = 5;

            // 2. Update Penguasaan Bola
            if (momentum > 50) stats.possH++; else stats.possA++;

            // 3. Event Logic
            let roll = Math.random() * 100;

            // GOL
            if ((momentum > 80 && roll < 3) || (momentum < 20 && roll < 2)) {
                triggerGoal();
            }
            // PELUANG EMAS
            else if ((momentum > 70 && roll < 8) || (momentum < 30 && roll < 6)) {
                triggerBigChance();
            }
            // CORNER
            else if (roll < 12) {
                triggerCorner();
            }
            // FOUL / KARTU
            else if (roll > 96) {
                triggerFoul();
            }
            
            updateStatsUI();
        }

        // --- EVENT TRIGGERS ---
        function triggerGoal() {
            if (momentum > 50) {
                scoreH++;
                stats.xGH += 0.85;
                addLog(minute, "goal", `⚽ GOLLL!! FC Ultra mencetak gol! Skor ${scoreH}-${scoreA}`);
            } else {
                scoreA++;
                stats.xGA += 0.85;
                addLog(minute, "goal", `⚽ GOLLL!! Real Madrid membalas! Skor ${scoreH}-${scoreA}`);
            }
            document.getElementById('scoreDisplay').innerText = `${scoreH} - ${scoreA}`;
            momentum = 50; 
        }

        function triggerBigChance() {
            if (momentum > 50) {
                stats.shotH++; stats.bigH++; stats.xGH += 0.45;
                // Simulasi penyelamatan jika tidak gol
                if(Math.random() > 0.3) stats.saveA++; 
                addLog(minute, "chance", "🔥 Peluang Emas! Tembakan keras FC Ultra masih bisa diselamatkan kiper!");
            } else {
                stats.shotA++; stats.bigA++; stats.xGA += 0.45;
                if(Math.random() > 0.3) stats.saveH++;
                addLog(minute, "chance", "🔥 Peluang Emas! Vinicius Jr lolos tapi tendangannya melambung!");
            }
        }

        function triggerCorner() {
            if (momentum > 50) {
                stats.corH++;
                addLog(minute, "corner", "🚩 Corner kick untuk FC Ultra United.");
            } else {
                stats.corA++;
                addLog(minute, "corner", "🚩 Corner kick untuk Real Madrid.");
            }
        }

        function triggerFoul() {
            if (momentum > 50) stats.foulA++; else stats.foulH++;
            addLog(minute, "card", "🟨 Kartu Kuning! Wasit menegur pemain karena pelanggaran telat.");
        }

        // --- UTILITIES ---
        function addLog(time, type, text) {
            const box = document.getElementById('logBox');
            const div = document.createElement('div');
            div.className = `log-item log-${type}`;
            div.innerHTML = `<span class="log-time">${time}'</span> ${text}`;
            box.prepend(div);
            if (box.children.length > 50) box.lastChild.remove();
        }

        function toggleStats() {
            const panel = document.getElementById('statsPanel');
            const btn = document.querySelector('.toggle-btn');
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'block';
                btn.innerText = "🙈 Sembunyikan Statistik";
            } else {
                panel.style.display = 'none';
                btn.innerText = "📊 Lihat Statistik Lengkap";
            }
        }

        // Fungsi Helper untuk Update Bar
        function updateBar(idH, idA, valH, valA, suffix = "") {
            let total = valH + valA;
            if (total === 0) total = 1; // Hindari divide by zero
            
            let pctH = (valH / total) * 100;
            let pctA = (valA / total) * 100;

            document.getElementById(idH).innerText = (typeof valH === 'number' && !Number.isInteger(valH)) ? valH.toFixed(2) + suffix : valH + suffix;
            document.getElementById(idA).innerText = (typeof valA === 'number' && !Number.isInteger(valA)) ? valA.toFixed(2) + suffix : valA + suffix;
            
            document.getElementById('bar_' + idH.replace('s_', '')).style.width = pctH + "%";
            document.getElementById('bar_' + idA.replace('s_', '')).style.width = pctA + "%";
        }

        function updateStatsUI() {
            // Penguasaan Bola (%)
            let totalPoss = stats.possH + stats.possA;
            let pH = totalPoss === 0 ? 50 : Math.round((stats.possH / totalPoss) * 100);
            document.getElementById('s_poss_h').innerText = pH + "%";
            document.getElementById('s_poss_a').innerText = (100-pH) + "%";
            document.getElementById('bar_poss_h').style.width = pH + "%";
            document.getElementById('bar_poss_a').style.width = (100-pH) + "%";

            // Stat lainnya menggunakan helper
            updateBar('s_xg_h', 's_xg_a', stats.xGH, stats.xGA);
            updateBar('s_big_h', 's_big_a', stats.bigH, stats.bigA);
            updateBar('s_shot_h', 's_shot_a', stats.shotH, stats.shotA);
            updateBar('s_save_h', 's_save_a', stats.saveH, stats.saveA);
            updateBar('s_cor_h', 's_cor_a', stats.corH, stats.corA);
            updateBar('s_foul_h', 's_foul_a', stats.foulH, stats.foulA);
        }

        function togglePause() {
            isPaused = !isPaused;
            updateButtons();
        }

        function updateButtons() {
            document.getElementById('btnPause').style.display = isPaused ? 'none' : 'inline-block';
            document.getElementById('btnResume').style.display = isPaused ? 'inline-block' : 'none';
        }

        // Start Game
        startMatch();
    </script>
</body>
</html>
