<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Manager - Skuad</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #334155;
            --border: #e2e8f0;
            --gk: #f59e0b; /* Kuning untuk Kiper */
            --def: #3b82f6; /* Biru untuk Bek */
            --mid: #10b981; /* Hijau untuk Gelandang */
            --fwd: #ef4444; /* Merah untuk Penyerang */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 20px;
            font-size: 13px;
        }

        /* --- HEADER --- */
        header {
            background: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { text-decoration: none; font-size: 1.2rem; color: var(--text); cursor: pointer; }
        h1 { margin: 0; font-size: 1.1rem; flex: 1; }

        /* --- FILTER POSISI --- */
        .filters {
            display: flex;
            gap: 8px;
            padding: 15px;
            overflow-x: auto;
            white-space: nowrap;
        }
        .filter-btn {
            background: white;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- LIST PEMAIN --- */
        .player-list { padding: 0 15px; }
        
        .player-card {
            background: var(--card);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .rating-box {
            width: 40px;
            height: 40px;
            background: #1e293b;
            color: white;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1rem;
            position: relative;
        }
        .pos-badge {
            position: absolute;
            bottom: -5px;
            font-size: 0.6rem;
            padding: 1px 4px;
            border-radius: 4px;
            color: white;
        }

        .player-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #e2e8f0;
            object-fit: cover;
        }

        .player-info { flex: 1; }
        .player-name { font-weight: bold; font-size: 0.9rem; margin-bottom: 2px; }
        .player-detail { font-size: 0.75rem; color: #64748b; }

        .condition-bar {
            width: 50px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }
        .condition-fill { height: 100%; background: #10b981; }

        footer { text-align: center; padding: 20px; font-size: 0.7rem; color: #94a3b8; }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <a href="dashboard.html" class="back-btn">⬅️</a>
        <h1>Skuad Utama (25/30)</h1>
    </header>

    <!-- Filter Posisi -->
    <div class="filters">
        <button class="filter-btn active">Semua</button>
        <button class="filter-btn">Kiper</button>
        <button class="filter-btn">Bek</button>
        <button class="filter-btn">Gelandang</button>
        <button class="filter-btn">Penyerang</button>
    </div>

    <!-- Daftar Pemain -->
    <div class="player-list">
        
        <!-- Pemain 1: Kiper -->
        <div class="player-card">
            <div class="rating-box">88<span class="pos-badge" style="background:var(--gk)">GK</span></div>
            <img src="https://ui-avatars.com/api/?name=Ederson&background=random" class="player-img" alt="Player">
            <div class="player-info">
                <div class="player-name">Ederson M.</div>
                <div class="player-detail">Brasil • 30 Thn</div>
                <div class="condition-bar"><div class="condition-fill" style="width: 98%"></div></div>
            </div>
        </div>

        <!-- Pemain 2: Bek -->
        <div class="player-card">
            <div class="rating-box">85<span class="pos-badge" style="background:var(--def)">CB</span></div>
            <img src="https://ui-avatars.com/api/?name=Ruben+Dias&background=random" class="player-img" alt="Player">
            <div class="player-info">
                <div class="player-name">Ruben Dias</div>
                <div class="player-detail">Portugal • 27 Thn</div>
                <div class="condition-bar"><div class="condition-fill" style="width: 92%"></div></div>
            </div>
        </div>

        <!-- Pemain 3: Gelandang -->
        <div class="player-card">
            <div class="rating-box">91<span class="pos-badge" style="background:var(--mid)">CM</span></div>
            <img src="https://ui-avatars.com/api/?name=Kevin+De+Bruyne&background=random" class="player-img" alt="Player">
            <div class="player-info">
                <div class="player-name">K. De Bruyne</div>
                <div class="player-detail">Belgia • 33 Thn</div>
                <div class="condition-bar"><div class="condition-fill" style="width: 85%; background: #f59e0b;"></div></div>
            </div>
        </div>

        <!-- Pemain 4: Penyerang -->
        <div class="player-card">
            <div class="rating-box">90<span class="pos-badge" style="background:var(--fwd)">ST</span></div>
            <img src="https://ui-avatars.com/api/?name=Erling+Haaland&background=random" class="player-img" alt="Player">
            <div class="player-info">
                <div class="player-name">E. Haaland</div>
                <div class="player-detail">Norwegia • 24 Thn</div>
                <div class="condition-bar"><div class="condition-fill" style="width: 100%"></div></div>
            </div>
        </div>

         <!-- Pemain 5: Bek -->
         <div class="player-card">
            <div class="rating-box">82<span class="pos-badge" style="background:var(--def)">LB</span></div>
            <img src="https://ui-avatars.com/api/?name=Josko+Gvardiol&background=random" class="player-img" alt="Player">
            <div class="player-info">
                <div class="player-name">J. Gvardiol</div>
                <div class="player-detail">Kroasia • 22 Thn</div>
                <div class="condition-bar"><div class="condition-fill" style="width: 95%"></div></div>
            </div>
        </div>

    </div>

    <footer>
        &copy; 2026 Ultra Manager Project
    </footer>

</body>
</html>
